---
- name: Ensure SSH server is installed and running
  apt:
    name: openssh-server
    state: present

- name: Enable SSH server
  systemd:
    name: ssh
    enabled: true
    state: started

- name: Generate SSH client keypair
  become: true
  become_user: "{{ username }}"
  openssh_keypair:
    path: "{{ user_home }}/.ssh/id_ed25519"
    type: ed25519
    comment: "{{ username }}@dev-box"
