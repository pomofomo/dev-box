---
- name: Ensure SSH server is installed and running
  apt:
    name: openssh-server
    state: present

- name: Enable SSH server
  systemd:
    name: ssh
    enabled: true
    state: started

- name: Generate SSH client keypair for dev user
  become: true
  become_user: "{{ dev_user }}"
  openssh_keypair:
    path: "{{ dev_home }}/.ssh/id_ed25519"
    type: ed25519
    comment: "{{ dev_user }}@dev-box"
