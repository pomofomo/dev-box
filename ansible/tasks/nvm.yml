---
- name: Install NVM
  become: true
  become_user: "{{ username }}"
  shell: |
    curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.40.1/install.sh | bash
  args:
    creates: "{{ user_home }}/.nvm/nvm.sh"

- name: Install Node LTS via NVM
  become: true
  become_user: "{{ username }}"
  shell: |
    export NVM_DIR="{{ user_home }}/.nvm"
    . "$NVM_DIR/nvm.sh"
    nvm install --lts
  args:
    executable: /bin/bash
