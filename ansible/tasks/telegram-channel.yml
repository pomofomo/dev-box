---
- name: Create Claude Telegram channel directory
  become: true
  become_user: "{{ dev_user }}"
  file:
    path: "{{ dev_home }}/.claude/channels/telegram"
    state: directory
    mode: "0755"

- name: Write Telegram bot token env file
  become: true
  become_user: "{{ dev_user }}"
  copy:
    content: "TELEGRAM_BOT_TOKEN={{ telegram_bot_token }}"
    dest: "{{ dev_home }}/.claude/channels/telegram/.env"
    mode: "0600"
  when: telegram_bot_token is defined and telegram_bot_token | length > 0
