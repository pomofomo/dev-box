---
- name: Create Claude channels directory
  become: true
  become_user: "{{ username }}"
  file:
    path: "{{ user_home }}/.claude/channels/telegram"
    state: directory
    mode: "0755"

- name: Install Telegram channel plugin
  become: true
  become_user: "{{ username }}"
  shell: |
    export NVM_DIR="{{ user_home }}/.nvm"
    . "$NVM_DIR/nvm.sh"
    claude /plugin marketplace add anthropics/claude-plugins-official 2>/dev/null || true
    claude /plugin marketplace update claude-plugins-official 2>/dev/null || true
    claude /plugin install telegram@claude-plugins-official 2>/dev/null || true
  args:
    executable: /bin/bash
  ignore_errors: true

- name: Write Telegram bot token env file (if token provided)
  become: true
  become_user: "{{ username }}"
  copy:
    content: "TELEGRAM_BOT_TOKEN={{ telegram_bot_token }}"
    dest: "{{ user_home }}/.claude/channels/telegram/.env"
    mode: "0600"
  when: telegram_bot_token is defined and telegram_bot_token | length > 0
